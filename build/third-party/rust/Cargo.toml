# Dummy target to keep Cargo happy
[[bin]]
name = "top"
path = "top.rs"

[dependencies]
clap = "4.5"
indexmap = "2.6"
log = "0.4"
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = "1.0"
tempfile = "3"
toml = "0.8"
proc-macro2 = "1.0"
quote = "1"
heck = "0.5"

[dependencies.syn]
version = "2.0"
default-features = false
features = [
  "clone-impls",
  "extra-traits",
  "fold",
  "full",
  "parsing",
  "printing",
]

[package]
name = "cbindgen-third-party"
version = "0.0.0"
edition = "2021"
publish = false

[workspace]
